# ═══════════════════════════════════════════════════════════════
# tiqu-jp ASR 纠错词典 — 示例文件
# ═══════════════════════════════════════════════════════════════
#
# 用法:
#   python3 tiqu.py video.mp4 --corrections corrections.yaml
#
# 格式: "ASR误识别文本": "正确文本"
# 支持部分匹配（出现在任何位置都会替换）
#
# 建议：先不带 --corrections 跑一遍，看字幕输出中有哪些
# 反复出现的误识别，然后把它们添加到词典里重新跑。
#
# ═══════════════════════════════════════════════════════════════

corrections:
  # ── 角色名纠正 ──
  # Whisper 经常把人名的假名/汉字搞混
  かりちゃん: あかりちゃん
  アカリちゃん: あかりちゃん

  # ── 专有名词纠正 ──
  ハンマーユージロ: 範馬勇次郎
  ハンマー友人: 範馬勇次郎
  はんまゆうじろう: 範馬勇次郎

  # ── 听错的词汇 ──
  市場子女: 淑女
  アメリカのタイプ: あかりちゃんのタイプ

  # ── 其他常见 ASR 错误 ──
  # （根据自己的视频内容添加）
  # 誤: 正
